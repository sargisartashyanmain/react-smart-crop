name: Deploy Demo to GitHub Pages

on:
  push:
    branches: [main] # Проверь, что твоя ветка называется именно main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Root Dependencies 🔧
        run: npm install

      - name: Build Library 🏗️
        run: npm run build

      - name: Install Demo Dependencies 🔧
        run: |
          cd demo
          npm install

      - name: Build Demo 🚀
        run: |
          cd demo
          npm run build

      - name: Deploy ✈️
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: demo/dist # Папка, которую сгенерировал Vite в папке demo
          branch: gh-pages   # Ветка, где будет жить сайт